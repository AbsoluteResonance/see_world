name: Build Android APK
on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon --console=plain

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/SeeWorld-v1.0.0.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/SeeWorld-*.apk
          generate_release_notes: true
