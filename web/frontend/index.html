<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>See World — 场景理解</title>
  <link rel="stylesheet" href="/static/css/style.css?v=2" />
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
</head>
<body>
  <header class="header">
    <h1>See World</h1>
    <p class="subtitle">上传 &amp; 场景理解 · <a href="/static/calibrate.html" style="color:var(--primary);font-size:0.85rem">相机标定</a></p>
  </header>

  <main class="container">
    <!-- Upload Area -->
    <section class="upload-section">
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone__icon">+</div>
        <p class="drop-zone__text">拖拽图片或视频到此处</p>
        <p class="drop-zone__hint">支持 JPG / PNG / WebP / MP4 / MOV，图片 &lt;20MB，视频 &lt;200MB</p>
        <label class="drop-zone__btn" for="fileInput">选择文件</label>
        <input type="file" id="fileInput" multiple accept="image/*,video/*" hidden />
      </div>
      <div class="upload-progress" id="uploadProgress" hidden>
        <div class="upload-progress__bar">
          <div class="upload-progress__fill" id="progressFill"></div>
        </div>
        <span class="upload-progress__text" id="progressText">0%</span>
      </div>
    </section>

    <!-- Gallery -->
    <section class="gallery-section">
      <div class="section-header">
        <h2>已上传文件</h2>
        <button class="btn-refresh" id="refreshBtn">刷新</button>
      </div>
      <div class="gallery" id="gallery">
        <div class="gallery__empty">暂无文件，请上传</div>
      </div>
    </section>

    <!-- File Preview Panel -->
    <section class="analysis-section" id="analysisSection" hidden>
      <div class="section-header">
        <h2>文件预览</h2>
        <button class="btn-close" id="closeAnalysis">&times;</button>
      </div>
      <div class="analysis-preview" id="analysisPreview"></div>
      <div style="margin-top:0.5rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
        <button class="btn-refresh" id="renameFileBtn" style="display:none">重命名</button>
        <button class="btn-refresh" id="deleteFileBtn" style="display:none; color:var(--error); border-color:var(--error);">删除</button>
      </div>
    </section>

    <!-- Dense Point Cloud Viewer -->
    <section class="viewer-section" id="denseViewerSection">
      <div class="section-header">
        <h2>3D 点云查看器 <span style="font-size:0.7rem;color:var(--primary);font-weight:normal;">稠密建图</span></h2>
        <div class="viewer-toolbar">
          <button class="btn-refresh" id="loadDenseBtn" style="display:none">加载稠密点云</button>
          <button class="btn-refresh" id="resetDenseViewBtn">重置视角</button>
        </div>
      </div>
      <div id="denseViewer3d-container" class="viewer3d-container">
        <p class="viewer3d-placeholder" id="denseViewer3d-status">完成 3D 重建后，点击"生成稠密点云"查看场景</p>
      </div>
      <div class="viewer-controls">
        <span class="viewer-hint">鼠标拖动旋转 · 滚轮缩放 · 右键平移 · R 重置视角</span>
      </div>
    </section>

    <!-- MASt3R-SLAM Streaming -->
    <section class="recon-section" id="streamSection">
      <div class="section-header">
        <h2>实时稠密重建 <span style="font-size:0.7rem;color:#a855f7;font-weight:normal;">MASt3R-SLAM</span></h2>
      </div>
      <div style="text-align:center; margin:0.5rem 0;">
        <video id="streamPreview" autoplay playsinline muted style="max-width:100%;max-height:240px;border-radius:8px;background:#000;" hidden></video>
      </div>
      <div style="text-align:center; margin:0.3rem 0; display:flex; gap:0.5rem; justify-content:center; align-items:center;">
        <button class="btn-analyze" id="startStreamBtnMast3r" style="background:#a855f7;color:white;">MASt3R-SLAM</button>
        <button class="btn-refresh" id="stopStreamBtn" hidden style="color:var(--error);border-color:var(--error);">停止</button>
        <label style="font-size:0.75rem;color:var(--text-muted);cursor:pointer;">
          <input type="checkbox" id="saveFramesCheck"> 保存帧
        </label>
        <label style="font-size:0.75rem;color:var(--text-muted);display:flex;align-items:center;gap:0.3rem;">
          每帧点:<input type="number" id="maxPointsInput" value="500" min="50" max="20000" step="100" style="width:5em;padding:0.15rem 0.3rem;border:1px solid #444;border-radius:4px;background:#1e1e2e;color:var(--text);font-size:0.75rem;">
        </label>
      </div>
      <div style="text-align:center;font-size:0.72rem;color:var(--text-muted);margin-top:0.25rem;">
        实时 · 增量稠密点云 · 需要 GPU
      </div>
      <div class="recon-status" id="streamStatus" hidden>
        <div class="recon-status__item">
          <span id="streamStats">等待中…</span>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>See World v0.2 · MASt3R-SLAM Dense Reconstruction</p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="/static/js/upload.js?v=3"></script>
  <script src="/static/js/gallery.js?v=3"></script>
  <script src="/static/js/viewer_dense.js?v=6"></script>
  <script src="/static/js/slam3r.js?v=20260530"></script>
  <script src="/static/js/app.js?v=4"></script>
</body>
</html>
